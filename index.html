<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公交司机驾驶游戏</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F4FF 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .game-container {
            width: 900px;
            height: 600px;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            position: relative;
        }

        .header {
            background: linear-gradient(90deg, #2C3E50 0%, #3498DB 100%);
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .status-panel {
            display: flex;
            gap: 40px;
        }

        .status-item {
            text-align: center;
        }

        .status-item .label {
            font-size: 12px;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .status-item .value {
            font-size: 28px;
            font-weight: bold;
        }

        .speed-value {
            color: #FFD700;
        }

        .station-value {
            color: #00FF88;
        }

        .passenger-value {
            color: #FF6B6B;
        }

        .game-area {
            height: 400px;
            background: linear-gradient(180deg, #87CEEB 0%, #5DADE2 30%, #5DADE2 30%, #2ECC71 50%, #2ECC71 50%, #2C3E50 100%);
            position: relative;
            overflow: hidden;
        }

        .road {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 200px;
            background: #2C3E50;
        }

        .road-marks {
            position: absolute;
            bottom: 100px;
            width: 100%;
            height: 4px;
            background: repeating-linear-gradient(
                90deg,
                #FFD700 0px,
                #FFD700 40px,
                transparent 40px,
                transparent 80px
            );
            animation: roadMove 0.5s linear infinite;
        }

        @keyframes roadMove {
            from { transform: translateX(0); }
            to { transform: translateX(-80px); }
        }

        .bus {
            position: absolute;
            bottom: 120px;
            left: 100px;
            width: 200px;
            height: 120px;
            transition: transform 0.1s ease;
        }

        .bus-body {
            position: absolute;
            width: 100%;
            height: 90px;
            background: linear-gradient(180deg, #E74C3C 0%, #C0392B 100%);
            border-radius: 10px;
            top: 0;
        }

        .bus-roof {
            position: absolute;
            width: 80%;
            height: 15px;
            background: #C0392B;
            border-radius: 5px 5px 0 0;
            top: -10px;
            left: 10%;
        }

        .bus-windows {
            position: absolute;
            top: 15px;
            left: 10px;
            width: calc(100% - 20px);
            height: 40px;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .bus-window {
            width: 30px;
            height: 35px;
            background: linear-gradient(180deg, #87CEEB 0%, #5DADE2 100%);
            border: 2px solid #34495E;
            border-radius: 3px;
        }

        .bus-door {
            position: absolute;
            right: 30px;
            top: 15px;
            width: 40px;
            height: 70px;
            background: #922B21;
            border: 3px solid #641E16;
            border-radius: 5px;
            transition: transform 0.3s ease;
        }

        .bus-door.open {
            transform: translateX(-20px) scaleX(0.3);
        }

        .bus-door::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 8px;
            height: 8px;
            background: #FFD700;
            border-radius: 50%;
        }

        .bus-wheels {
            position: absolute;
            bottom: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 0 30px;
        }

        .bus-wheel {
            width: 40px;
            height: 40px;
            background: linear-gradient(180deg, #34495E 0%, #2C3E50 100%);
            border-radius: 50%;
            position: relative;
            animation: wheelSpin 0.3s linear infinite;
        }

        .bus-wheel.stopped {
            animation: none;
        }

        @keyframes wheelSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .bus-wheel::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 15px;
            height: 15px;
            background: #7F8C8D;
            border-radius: 50%;
        }

        .stations {
            position: absolute;
            bottom: 200px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 0 50px;
        }

        .station {
            width: 80px;
            height: 100px;
            background: linear-gradient(180deg, #ECF0F1 0%, #BDC3C7 100%);
            border-radius: 10px 10px 0 0;
            position: relative;
            border: 3px solid #95A5A6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .station.current {
            border-color: #FFD700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            transform: scale(1.1);
        }

        .station.passed {
            opacity: 0.5;
        }

        .station-number {
            font-size: 24px;
            font-weight: bold;
            color: #2C3E50;
            margin-bottom: 5px;
        }

        .station-sign {
            font-size: 12px;
            color: #7F8C8D;
        }

        .station::before {
            content: '';
            position: absolute;
            top: -20px;
            width: 6px;
            height: 20px;
            background: #95A5A6;
        }

        .passengers {
            position: absolute;
            bottom: 220px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 0 70px;
            pointer-events: none;
        }

        .passenger-group {
            display: flex;
            gap: 5px;
        }

        .passenger {
            width: 20px;
            height: 35px;
            background: linear-gradient(180deg, #3498DB 0%, #2980B9 100%);
            border-radius: 10px 10px 5px 5px;
            position: relative;
            animation: passengerWait 1s ease-in-out infinite;
        }

        @keyframes passengerWait {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        .passenger::before {
            content: '';
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 15px;
            height: 15px;
            background: #F39C12;
            border-radius: 50%;
        }

        .controls {
            padding: 20px 30px;
            background: #F8F9FA;
            border-top: 2px solid #E9ECEF;
        }

        .speed-display {
            text-align: center;
            margin-bottom: 15px;
        }

        .speed-bar-container {
            width: 100%;
            height: 30px;
            background: #DEE2E6;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            border: 2px solid #CED4DA;
        }

        .speed-bar {
            height: 100%;
            background: linear-gradient(90deg, #27AE60 0%, #F1C40F 50%, #E74C3C 100%);
            transition: width 0.1s ease;
            border-radius: 15px;
        }

        .speed-label {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-weight: bold;
            color: #2C3E50;
            text-shadow: 0 0 3px white;
        }

        .key-hints {
            display: flex;
            justify-content: center;
            gap: 60px;
            margin-top: 15px;
        }

        .key-hint {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .key {
            width: 50px;
            height: 50px;
            background: linear-gradient(180deg, #FFFFFF 0%, #F8F9FA 100%);
            border: 3px solid #DEE2E6;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: #2C3E50;
            box-shadow: 0 4px 0 #DEE2E6;
            transition: all 0.1s ease;
        }

        .key.pressed {
            transform: translateY(4px);
            box-shadow: 0 0 0 #DEE2E6;
        }

        .key-text {
            font-size: 14px;
            color: #6C757D;
        }

        .message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 20px 40px;
            border-radius: 15px;
            font-size: 24px;
            font-weight: bold;
            animation: messagePopup 2s ease-out forwards;
            z-index: 100;
        }

        @keyframes messagePopup {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
            30% { transform: translate(-50%, -50%) scale(1); }
            80% { opacity: 1; }
            100% { opacity: 0; }
        }

        .warning {
            background: rgba(231, 76, 60, 0.9) !important;
        }

        .success {
            background: rgba(39, 174, 96, 0.9) !important;
        }

        .door-status {
            position: absolute;
            top: 100px;
            right: 30px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 16px;
        }

        .door-status.closed {
            color: #95A5A6;
        }

        .door-status.open {
            color: #2ECC71;
            animation: doorOpenBlink 0.5s ease infinite;
        }

        @keyframes doorOpenBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .cooldown-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
        }

        .cooldown-text {
            font-size: 48px;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        .game-over h2 {
            font-size: 48px;
            color: #FFD700;
            margin-bottom: 20px;
        }

        .game-over p {
            font-size: 24px;
            color: white;
            margin-bottom: 10px;
        }

        .restart-btn {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            background: linear-gradient(180deg, #3498DB 0%, #2980B9 100%);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .restart-btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div id="app" class="game-container">
        <div class="header">
            <h1>🚌 公交司机驾驶游戏</h1>
            <div class="status-panel">
                <div class="status-item">
                    <div class="label">当前速度</div>
                    <div class="value speed-value">{{ speed.toFixed(1) }} km/h</div>
                </div>
                <div class="status-item">
                    <div class="label">当前站点</div>
                    <div class="value station-value">{{ currentStation }} / 6</div>
                </div>
                <div class="status-item">
                    <div class="label">乘客数量</div>
                    <div class="value passenger-value">{{ passengers }}</div>
                </div>
            </div>
        </div>

        <div class="game-area">
            <div class="road"></div>
            <div class="road-marks" :style="{ animationDuration: roadAnimationDuration }"></div>

            <div class="stations">
                <div 
                    v-for="station in 6" 
                    :key="station"
                    class="station"
                    :class="{ 
                        current: station === currentStation,
                        passed: station < currentStation
                    }"
                >
                    <div class="station-number">{{ station }}</div>
                    <div class="station-sign">站点</div>
                </div>
            </div>

            <div class="passengers">
                <div 
                    v-for="station in 6" 
                    :key="station"
                    class="passenger-group"
                >
                    <div 
                        v-if="station >= currentStation && station <= 6"
                        class="passenger"
                    ></div>
                </div>
            </div>

            <div class="bus">
                <div class="bus-roof"></div>
                <div class="bus-body">
                    <div class="bus-windows">
                        <div class="bus-window"></div>
                        <div class="bus-window"></div>
                        <div class="bus-window"></div>
                        <div class="bus-window"></div>
                    </div>
                    <div class="bus-door" :class="{ open: doorOpen }"></div>
                </div>
                <div class="bus-wheels">
                    <div class="bus-wheel" :class="{ stopped: speed === 0 }"></div>
                    <div class="bus-wheel" :class="{ stopped: speed === 0 }"></div>
                </div>
            </div>

            <div class="door-status" :class="{ open: doorOpen, closed: !doorOpen }">
                车门: {{ doorOpen ? '已打开' : '已关闭' }}
            </div>

            <div v-if="cooldown > 0" class="cooldown-overlay">
                <div class="cooldown-text">{{ cooldown.toFixed(1) }}秒后才能加速</div>
            </div>

            <div v-if="message" class="message" :class="messageType">{{ message }}</div>
        </div>

        <div class="controls">
            <div class="speed-display">
                <div class="speed-bar-container">
                    <div class="speed-bar" :style="{ width: (speed / 100 * 100) + '%' }"></div>
                    <div class="speed-label">{{ speed.toFixed(1) }} km/h</div>
                </div>
            </div>
            <div class="key-hints">
                <div class="key-hint">
                    <div class="key" :class="{ pressed: keyPressed === 'a' }">A</div>
                    <div class="key-text">减速 / 开关门</div>
                </div>
                <div class="key-hint">
                    <div class="key" :class="{ pressed: keyPressed === 'd' }">D</div>
                    <div class="key-text">加速</div>
                </div>
            </div>
        </div>

        <div v-if="gameOver" class="game-over">
            <h2>🎉 游戏完成！</h2>
            <p>恭喜您完成了所有 6 个站点的运营！</p>
            <p>最终乘客数: <span style="color: #FFD700; font-weight: bold;">{{ passengers }}</span> 位</p>
            <button class="restart-btn" @click="restartGame">重新开始</button>
        </div>
    </div>

    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    speed: 0,
                    currentStation: 1,
                    passengers: 0,
                    doorOpen: false,
                    cooldown: 0,
                    message: '',
                    messageType: '',
                    keyPressed: null,
                    gameOver: false,
                    roadAnimationDuration: '0.5s'
                };
            },
            mounted() {
                window.addEventListener('keydown', this.handleKeyDown);
                window.addEventListener('keyup', this.handleKeyUp);
                this.gameLoop();
            },
            unmounted() {
                window.removeEventListener('keydown', this.handleKeyDown);
                window.removeEventListener('keyup', this.handleKeyUp);
            },
            methods: {
                handleKeyDown(event) {
                    if (this.gameOver) return;
                    
                    const key = event.key.toLowerCase();
                    
                    if (key === 'a' || key === 'd') {
                        this.keyPressed = key;
                    }
                    
                    if (key === 'd') {
                        if (this.cooldown > 0) {
                            this.showMessage('冷却中，无法加速！', 'warning');
                            return;
                        }
                        
                        if (this.speed > 0 && this.doorOpen) {
                            this.speed = 0;
                            this.passengers = Math.max(0, this.passengers - 1);
                            this.showMessage('⚠️ 未完全停止加速！扣除1位乘客', 'warning');
                            this.doorOpen = false;
                            return;
                        }
                        
                        if (this.speed < 100) {
                            this.speed = Math.min(100, this.speed + 15);
                        }
                    }
                    
                    if (key === 'a') {
                        if (this.speed > 0) {
                            this.speed = Math.max(0, this.speed - 10);
                        } else if (this.speed === 0) {
                            this.toggleDoor();
                        }
                    }
                },
                handleKeyUp(event) {
                    const key = event.key.toLowerCase();
                    if (key === this.keyPressed) {
                        this.keyPressed = null;
                    }
                },
                toggleDoor() {
                    if (this.cooldown > 0) return;
                    
                    if (!this.doorOpen) {
                        this.doorOpen = true;
                        this.showMessage('🚪 车门已打开', 'success');
                        
                        setTimeout(() => {
                            if (this.currentStation <= 6) {
                                this.passengers++;
                                this.showMessage('👤 乘客上车！共 ' + this.passengers + ' 位', 'success');
                                
                                if (this.currentStation < 6) {
                                    setTimeout(() => {
                                        this.currentStation++;
                                        this.startCooldown();
                                    }, 1000);
                                } else {
                                    setTimeout(() => {
                                        this.gameOver = true;
                                    }, 1000);
                                }
                            }
                        }, 1500);
                    } else {
                        this.doorOpen = false;
                        this.showMessage('🚪 车门已关闭', 'success');
                    }
                },
                startCooldown() {
                    this.cooldown = 2;
                    this.doorOpen = false;
                },
                showMessage(text, type) {
                    this.message = text;
                    this.messageType = type;
                    setTimeout(() => {
                        this.message = '';
                        this.messageType = '';
                    }, 2000);
                },
                restartGame() {
                    this.speed = 0;
                    this.currentStation = 1;
                    this.passengers = 0;
                    this.doorOpen = false;
                    this.cooldown = 0;
                    this.message = '';
                    this.gameOver = false;
                },
                gameLoop() {
                    setInterval(() => {
                        if (this.cooldown > 0) {
                            this.cooldown = Math.max(0, this.cooldown - 0.1);
                        }
                        
                        if (this.speed > 0 && !this.keyPressed) {
                            this.speed = Math.max(0, this.speed - 0.5);
                        }
                        
                        if (this.speed > 0) {
                            this.roadAnimationDuration = (0.5 / (this.speed / 50 + 0.5)) + 's';
                        } else {
                            this.roadAnimationDuration = '0.5s';
                        }
                    }, 100);
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
